<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instant Draw Admin</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./scripts/admin.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="이벤트 홈">
        <span class="brand-mark">ID</span>
        <span>Instant Draw</span>
      </a>
      <div class="topbar-actions">
        <span id="adminStateBadge" class="status-pill">로그아웃</span>
        <a class="ghost-link" href="./index.html">참여 화면</a>
      </div>
    </header>

    <main class="admin-shell">
      <section class="admin-grid">
        <div class="admin-card login-card" id="adminLoginCard">
          <div class="section-heading compact">
            <p class="eyebrow">Admin</p>
            <h1>관리자 로그인</h1>
          </div>
          <form id="adminLoginForm" class="stack-form" autocomplete="off">
            <label for="adminIdInput">ID</label>
            <input id="adminIdInput" name="admin_id" value="super" required />
            <label for="adminPasswordInput">Password</label>
            <input id="adminPasswordInput" name="password" type="password" placeholder="password" required />
            <button id="adminLoginButton" class="btn primary" type="submit">로그인</button>
          </form>
          <div id="adminLoginMessage" class="message" role="status" aria-live="polite"></div>
        </div>

        <div class="admin-card" id="adminCreateRoomCard">
          <div class="section-heading compact">
            <p class="eyebrow">Event</p>
            <h2>신규 이벤트</h2>
          </div>
          <button id="openCreateRoomPanelButton" class="btn primary" type="button">신규 이벤트 생성</button>
          <div id="createRoomPanel" class="create-room-panel is-hidden">
            <form id="createRoomForm" class="stack-form" autocomplete="off">
              <label for="roomTitleInput">이벤트명</label>
              <input id="roomTitleInput" name="title" placeholder="5월 타운홀 럭키드로우" required />
              <label for="newRoomCodeInput">이벤트 코드</label>
              <input id="newRoomCodeInput" name="code" placeholder="EVENT-001" />
              <div class="two-col">
              <div>
                <label for="startsAtInput">시작</label>
                <input id="startsAtInput" name="starts_at" type="datetime-local" />
              </div>
              <div>
                <label for="endsAtInput">마감</label>
                <input id="endsAtInput" name="ends_at" type="datetime-local" required />
              </div>
            </div>
            <button id="createRoomButton" class="btn secondary" type="submit">이벤트 열기</button>
          </form>
          <div id="createRoomMessage" class="message" role="status" aria-live="polite"></div>
          </div>
        </div>

        <div class="admin-card control-card" id="adminControlCard">
          <div class="section-heading compact">
            <p class="eyebrow">Control</p>
            <h2>이벤트 현황</h2>
          </div>
          <div class="stack-form">
            <label for="roomSelect">이벤트 선택</label>
            <select id="roomSelect"></select>
            <label for="roomParticipantCountInput">종료 인원</label>
            <input id="roomParticipantCountInput" name="participant_count" type="number" min="1" placeholder="종료 시 인원수를 입력하세요" />
            <div class="metric-row admin-metrics">
              <div class="metric">
                <span class="metric-value" id="adminParticipantCount">0</span>
                <span class="metric-label">응모자</span>
              </div>
              <div class="metric">
                <span class="metric-value" id="adminRoomStatus">대기</span>
                <span class="metric-label">상태</span>
              </div>
            </div>
            <div class="button-row">
              <button id="refreshRoomsButton" class="btn neutral" type="button">새로고침</button>
              <button id="closeRoomButton" class="btn danger" type="button">응모 마감</button>
            </div>
            <a id="shareEntryLink" class="share-link" href="./index.html">참여 링크</a>
          </div>
        </div>

        <div class="admin-card draw-admin-card" id="adminDrawCard">
          <div class="section-heading compact">
            <p class="eyebrow">Draw</p>
            <h2>추첨 메뉴</h2>
          </div>
          <form id="createDrawForm" class="stack-form">
            <label for="winnerCountSelect">당첨자 수</label>
            <div class="winner-count-row">
              <select id="winnerCountSelect" name="winner_count">
                <!-- <option value="1">1명</option> -->
                <!-- <option value="3">3명</option> -->
                <!-- <option value="5">5명</option> -->
                <option value="custom" selected>직접 입력</option>
              </select>
              <input id="customWinnerCountInput" type="number" min="1" placeholder="직접" />
            </div>
            <label for="drawModeSelect">추첨 UI</label>
            <select id="drawModeSelect" name="draw_mode">
              <option value="card" selected>card</option>
              <!-- <option value="capsule">capsule</option> -->
              <!-- <option value="lotto">lotto</option> -->
            </select>
            <fieldset class="segmented-field">
              <legend>공개 방식</legend>
              <label><input type="radio" name="reveal_mode" value="auto" checked /> auto</label>
              <label><input type="radio" name="reveal_mode" value="manual" /> manual</label>
            </fieldset>
            <button id="createDrawButton" class="btn primary" type="submit">추첨 시작</button>
          </form>
          <div class="button-row reveal-actions">
            <button id="revealNextButton" class="btn secondary" type="button">다음 공개</button>
            <button id="revealAllButton" class="btn neutral" type="button">전체 공개</button>
            <button id="finishDrawButton" class="btn danger" type="button">추첨 종료</button>
          </div>
          <div id="drawAdminMessage" class="message" role="status" aria-live="polite"></div>
        </div>
      </section>

      <section class="draw-panel admin-preview" id="adminPreviewSection">
        <div class="section-heading">
          <p class="eyebrow">Preview</p>
          <h2>추첨 화면</h2>
        </div>
        <div id="adminDrawStage" class="draw-stage empty-state">이벤트를 선택해 주세요</div>
        <div class="result-wrap">
          <h3>당첨자 목록</h3>
          <ol id="adminResultList" class="result-list"></ol>
        </div>
      </section>
    </main>
  </body>
</html>
